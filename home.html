<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home | GitHub Issues Tracker</title>

    <!-- Favicon -->
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">

    <!-- Font : Geist -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- DaisyUI + Tailwind CSS -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Font awesome cdn -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- CSS file -->
    <link rel="stylesheet" href="./style/style.css">
</head>

<body>

    <header class="navbar bg-base-100 shadow-sm">
        <div class="w-11/12 mx-auto flex justify-between items-center">
            <div id="logo" class="flex items-center gap-2">
                <div class="w-8">
                    <img src="./assets/github-logo.png" alt="">
                </div>
                <div>
                    <h2 class="text-2xl font-semibold text-[#1F2937]">GitHub Issues Tracker</h2>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <input id="input-search" type="text" placeholder="Search issues..." class="input input-bordered w-24 md:w-auto" />
                <button id="issue-btn" class="btn btn-primary font-semibold"><i class="fa-solid fa-plus"></i>New
                    Issue</button>
            </div>
        </div>
    </header>

    <main class="bg-[#F8FAFC] py-5">
        <section id="filter-btn" class="w-10/12 mx-auto navbar bg-base-100 shadow-sm flex gap-3 px-5 mt-8">
            <button onclick="filterBtn('all-btn')" id="all-btn" class="btn btn-primary">All</button>
            <button onclick="filterBtn('open-btn')" id="open-btn" class="btn btn-outline">Open</button>
            <button onclick="filterBtn('closed-btn')" id="closed-btn" class="btn btn-outline">Closed</button>
        </section>

        <section id="issue-count-section" class="w-10/12 mx-auto navbar bg-base-100 shadow-sm flex justify-between items-center p-5 my-4">
            <div class="flex gap-3">
                <div class="">
                    <img class="w-13 rounded-full p-2 bg-[#ECE4FF]" src="./assets/Aperture.png" alt="">
                </div>
                <div>
                    <h2 class="font-semibold text-xl text-[#1F2937]"><span id="issue-count">0</span> Issues</h2>
                    <p class="text-[#64748B]">Track and manage your project issues</p>
                </div>
            </div>

            <div class="flex gap-4">
                <div class="flex items-center gap-1">
                    <img src="./assets/Ellipse-open.png" alt="">
                    <p class="font-medium text-[#1F2937]">Open</p>
                </div>
                <div class="flex items-center gap-1">
                    <img src="./assets/Ellipse-closed.png" alt="">
                    <p class="font-medium text-[#1F2937]">Closed</p>
                </div>
            </div>
        </section>

        <section id="all-issues" class="">
            <div id="all-cards"
            class="w-10/12 mx-auto bg-base-100 shadow-sm p-5 my-4 grid grid-cols-4 gap-x-1 gap-y-4"></div>

        </section>

        <section id="open-card" class="hidden">
            <div id="open-issues" class="w-10/12 mx-auto bg-base-100 shadow-sm p-5 my-4 grid grid-cols-4 space-x-1 space-y-4"></div>
        </section>

        <section id="closed-card" class="hidden">
            <div id="closed-issues" class="w-10/12 mx-auto bg-base-100 shadow-sm p-5 my-4 grid grid-cols-4 space-x-1 space-y-4"></div>
        </section>
    </main>

    <section id="modal">
        <!-- Open the modal using ID.showModal() method -->
        <!-- <button class="btn" onclick="my_modal_5.showModal()">open modal</button> -->
        <dialog id="my_modal_5" class="modal modal-bottom sm:modal-middle">
            <div class="modal-box">
                <div id="details-card">
                    
                </div>
                <div class="modal-action">
                    <form method="dialog">
                        <!-- if there is a button in form, it will close the modal -->
                        <button class="btn btn-primary">Close</button>
                    </form>
                </div>
            </div>
        </dialog>
    </section>

    <script src="./script/home.js"></script>
</body>

</html>
