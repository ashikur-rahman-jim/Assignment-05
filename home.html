<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home | GitHub Issues Tracker</title>

    <!-- Favicon -->
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">

    <!-- Font : Geist -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- DaisyUI + Tailwind CSS -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Font awesome cdn -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- CSS file -->
    <link rel="stylesheet" href="./style/style.css">
</head>

<body>

    <header class="navbar bg-base-100 shadow-sm">
        <div class="w-11/12 mx-auto flex justify-between items-center">
            <div id="logo" class="flex items-center gap-2">
                <div class="w-8">
                    <img src="./assets/github-logo.png" alt="">
                </div>
                <div>
                    <h2 class="text-2xl font-semibold text-[#1F2937]">GitHub Issues Tracker</h2>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <input type="text" placeholder="Search issues..." class="input input-bordered w-24 md:w-auto" />
                <button id="new-issue" class="btn btn-primary font-semibold"><i class="fa-solid fa-plus"></i>New Issue</button>
            </div>
        </div>
    </header>

</body>

</html>
