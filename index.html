<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>

    <!-- Favicon -->
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">

    <!-- Font : Geist -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- DaisyUI + Tailwind CSS -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- CSS file -->
    <link rel="stylesheet" href="./style/style.css">
</head>

<body>

    <div id="login-section" class="min-h-screen max-w-md bg-base-100 mx-auto">

        <div id="logo" class="flex flex-col items-center my-4">
            <img src="./assets/github-logo.png" alt="">
            <h2 class="font-semibold text-2xl text-[#1F2937] mt-4">GitHub Issues Tracker</h2>
            <p class="text-[#64748B]">Sign in to manage your issues</p>
        </div>

        <div id="login" class="flex flex-col items-center">
            <fieldset class="fieldset bg-base-200 border-base-300 rounded-box w-xs border p-4 shadow-sm">

                <label class="font-medium text-[#1F2937]">Username</label>
                <input id="input-username" type="email" class="input" placeholder="Enter Username" />
                <p class="text-[12px] text-[#4A00FF] mb-4">Default : admin</p>

                <label class="font-medium text-[#1F2937]">Password</label>
                <input id="input-password" type="password" class="input" placeholder="Enter Password" />
                <p class="text-[12px] text-[#4A00FF]">Default : admin123</p>

                <button id="signin-btn" class="btn btn-primary mt-4">Sign in</button>
            </fieldset>

            <p class="text-[14px] text-[#1F2937]">OR</p>
            <p class="text-[12px] text-[#64748B] my-3">Demo Credentials:</p>
            <p class="text-[14px] text-[#1F2937]"><span class="font-semibold">Username :</span> admin</p>
            <p class="text-[14px] text-[#1F2937]"><span class="font-semibold">Password :</span> admin123</p>
        </div>

    </div>

    <script src="./script/login.js"></script>
</body>

</html>
